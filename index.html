<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Design Mastery | Travique</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>

</head>
<body>
    <!-- NavBar -->

    <nav>
        
        <div class="nav-header">
            <div class="nav-logo">
                <a href="#" class="logo">Travique</a>
            </div>

            <div class="nav-menu-btn" id="menu-btn"><i class="ri-menu-line"></i>
            </div>
        </div>

        <ul class="nav-links" id="nav-link">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#tour">Tour</a></li>
            <li><a href="#package">Package</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#">Book Trip</a></li>
        </ul>

        <div class="nav-btn">
            <button class="btn">Book Trip</button>
        </div>
    </nav>

    <!-- Header -->

    <header id="home">
        <div class="header-container">
            <dix class="header-content">
                <p>Discover breathtaking destinations, unforgettable adventures, and customized travel experiences designed for every traveler.</p>
                <h1>Explore The World With Us</h1>
                <div class="header-btn">
                    <button class="btn">Book Your Trip Now</button>
                    <a href="#">
                        <span><i class="ri-play-circle-fill"></i></span>
                    </a>
                </div>
            </dix>

            <div class="header-image">
                <img src="assets/header.png" alt="Header Image">
            </div>
        </div>
    </header>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="main.js"></script>
</body>
</html>
